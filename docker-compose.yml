services:
  backend:
    build:
      context: ./backend
    environment:
      HOST: 0.0.0.0
      PORT: ${BACKEND_PORT:-8000}
      DEBUG: ${BACKEND_DEBUG:-false}
    expose:
      - "${BACKEND_PORT:-8000}"
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; port=os.getenv('PORT', '8000'); urllib.request.urlopen(f'http://127.0.0.1:{port}/api/hello', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_URL: http://backend:${BACKEND_PORT:-8000}/api
      BACKEND_ORIGIN: http://backend:${BACKEND_PORT:-8000}
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
