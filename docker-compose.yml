services:
  backend:
    build:
      context: ./backend
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      DEBUG: "false"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/hello', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - app-internal

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "8080"
    restart: unless-stopped
    networks:
      - app-internal
      - app-entry

networks:
  app-entry:
  app-internal:
    internal: true
